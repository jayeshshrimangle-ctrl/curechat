<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login to your CureChat AI account.">
  <title>Login | CureChat AI</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gradient-hero);
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .auth-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(14,165,233,0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 30%, rgba(6,214,160,0.07) 0%, transparent 50%);
    }

    .auth-page .hero-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(148,163,184,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148,163,184,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .auth-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 440px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: var(--shadow-lg), var(--shadow-glow);
      animation: fadeInUp 0.6s ease;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo-icon {
      width: 60px;
      height: 60px;
      background: var(--gradient-primary);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 1rem;
      box-shadow: 0 0 30px rgba(14, 165, 233, 0.3);
    }

    .auth-logo h1 {
      font-size: 1.5rem;
      font-weight: 800;
    }

    .auth-logo p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-top: 0.35rem;
    }

    .auth-form .form-group {
      margin-bottom: 1.25rem;
    }

    .auth-form .form-label {
      font-weight: 600;
    }

    .auth-submit {
      width: 100%;
      margin-top: 0.5rem;
    }

    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .auth-footer a {
      color: var(--primary-light);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .auth-divider {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.8rem;
      margin: 1.5rem 0;
      position: relative;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--glass-border);
    }

    .auth-divider::before { left: 0; }
    .auth-divider::after { right: 0; }

    .input-icon-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
    }

    .input-icon-wrapper .form-input {
      padding-left: 2.75rem;
    }

    .password-toggle {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
    }

    .back-home {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      z-index: 10;
      transition: var(--transition);
    }

    .back-home:hover {
      color: var(--primary-light);
    }
  </style>
</head>
<body>
  <a href="/" class="back-home">← Back to Home</a>

  <div class="auth-page">
    <div class="hero-grid"></div>

    <div class="auth-card">
      <div class="auth-logo">
        <img src="/images/logo.png" alt="CureChat AI" style="width:60px;height:60px;border-radius:18px;object-fit:contain;">
        <h1>Welcome Back</h1>
        <p>Login to your CureChat AI account</p>
      </div>

      <form class="auth-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <div class="input-icon-wrapper">
            <span class="input-icon">📧</span>
            <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="input-icon-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required>
            <button type="button" class="password-toggle" onclick="togglePassword()">👁</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg auth-submit" id="login-btn">
          Login →
        </button>
      </form>

      <div class="auth-divider">or</div>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Create Account</a>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (isLoggedIn()) {
      window.location.href = '/dashboard';
    }

    function togglePassword() {
      const input = document.getElementById('login-password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const data = await apiRequest('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password })
        });

        setToken(data.token);
        setUser(data.user);
        showToast('Login successful! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/dashboard', 1000);
      } catch (error) {
        showToast(error.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Login →';
      }
    }
  </script>
</body>
</html>
